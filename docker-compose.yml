version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: coffee_postgres
    restart: always
    environment:
      POSTGRES_USER: coffee_admin
      POSTGRES_PASSWORD: coffee_password123
      POSTGRES_DB: coffee_tracing_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coffee_admin -d coffee_tracing_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coffee_backend
    restart: always
    environment:
      DATABASE_URL: "postgresql://coffee_admin:coffee_password123@postgres:5432/coffee_tracing_db?schema=public"
      PORT: 4000
      NODE_ENV: production
      CLIENT_ORIGIN: "http://localhost:3000"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coffee_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:4000/api/v1"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
